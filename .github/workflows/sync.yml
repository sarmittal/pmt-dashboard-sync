name: PMT Dashboard Sync

on:
  schedule:
    - cron: '0 7 * * 1-5'   # 7am UTC Monday-Friday
  workflow_dispatch:
  repository_dispatch:
    types: [refresh-dashboard]

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Run Smartsheet sync + write to GitHub Pages
        env:
          SMARTSHEET_TOKEN: ${{ secrets.SMARTSHEET_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.PERSONAL_GITHUB_TOKEN }}
          GITHUB_USER: sarmittal
          GITHUB_REPO: pmt-dashboard-sync
        run: python sync_smartsheet.py
