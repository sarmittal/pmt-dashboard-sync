name: PMT Dashboard Sync

on:
  # Run automatically on a schedule
  schedule:
    - cron: '0 7 * * 1-5'   # 7am UTC Monday-Friday (adjust to your timezone)

  # Allow manual trigger from GitHub UI
  workflow_dispatch:

  # Allow trigger via webhook URL (what the Refresh button calls)
  repository_dispatch:
    types: [refresh-dashboard]

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Run sync
        env:
          SMARTSHEET_TOKEN: ${{ secrets.SMARTSHEET_TOKEN }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          PROJECT_ID: ${{ secrets.PROJECT_ID }}
        run: python sync_smartsheet.py

      - name: Upload dashboard-data.json to SharePoint
        env:
          SHAREPOINT_SITE_URL: ${{ secrets.SHAREPOINT_SITE_URL }}
          SHAREPOINT_CLIENT_ID: ${{ secrets.SHAREPOINT_CLIENT_ID }}
          SHAREPOINT_CLIENT_SECRET: ${{ secrets.SHAREPOINT_CLIENT_SECRET }}
          SHAREPOINT_TENANT_ID: ${{ secrets.SHAREPOINT_TENANT_ID }}
        run: python upload_to_sharepoint.py
